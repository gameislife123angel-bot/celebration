<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations Dad 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="title" class="title">🎂 Tap the Cake</h1>

<!-- Cake -->
<div id="cake" class="cake">
    <div class="half left"></div>
    <div class="half right"></div>
    <div class="top"></div>

    <div class="candle">
        <div class="flame"></div>
    </div>
</div>

<!-- Gift -->
<div id="gift" class="gift">
    <div class="ribbon vertical"></div>
    <div class="ribbon horizontal"></div>
    <div class="lid"></div>
    <div class="box"></div>
</div>

<!-- Blessings -->
<div id="blessings" class="blessings"></div>

<script src="index.js"></script>
</body>
</html>
